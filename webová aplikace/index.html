<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPlanner</title>
    <link rel="icon" type="image/x-icon" href="/images/paw.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fade-in {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
        animation: fade-in 0.3s ease;
        }
    </style>

</head>

<body id="appBody" class="bg-gray-900 text-white min-h-screen transition-colors duration-300">

    <!-- NAVBAR -->
    <header class="p-5 rounded-2xl shadow transition bg-white/10 backdrop-blur-lg border border-white/10 p-4 shadow">
        <nav class="flex justify-between items-center max-w-6xl mx-auto">
            <h1 class="text-xl font-bold text-purple-400">StudyPlanner</h1>
            
            <span id="userDisplay" class="text-sm text-purple-300"></span>

            <ul class="flex flex-wrap gap-3 text-sm">
                <li><a href="#" class="hover:text-purple-400">Dashboard</a></li>
                <li><a href="about.html" class="hover:text-purple-400">About</a></li>
                <li><a href="login.html" class="hover:text-purple-400">Login</a></li>
                <li>
                    <button id="themeToggle"
                      class="px-3 py-1 rounded bg-purple-600 hover:bg-purple-700 shadow-lg shadow-purple-500/30">
                      Přepnout motiv
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="max-w-6xl mx-auto p-4 sm:p-6 grid md:grid-cols-3 gap-4 sm:gap-6">
        <!-- class="max-w-6xl mx-auto p-6 grid md:grid-cols-3 gap-6"> -->  

        <!-- TASKS -->
        <section id="today-tasks" class="md:col-span-2 p-5 rounded-2xl backdrop-blur-lg border border-purple-500/20 shadow-lg shadow-purple-500/10">
            <h2 class="text-lg font-semibold mb-4">Dnešní úkoly</h2>

            <!-- ADD TASK -->
            <form id="taskForm" class="flex flex-col sm:flex-row gap-2 mb-4">

                <input id="taskInput" type="text" placeholder="Nový úkol..."
                  class="flex-1 p-2 rounded bg-gray-700 outline-none">
                  
                <input id="taskDate" type="date"
                  class="hover:scale-105 transition-transform p-2 rounded bg-gray-700 outline-none">

                <select id="taskPriority"
                  class="p-2 rounded bg-gray-700">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <button class="bg-purple-500 px-4 py-2 rounded hover:bg-purple-600 shadow-lg shadow-purple-500/30">
                  Přidat
                </button>
            </form>

            <!-- PROGRESS BAR -->
            <div class="mb-4">
                <div class="w-full bg-gray-700 rounded h-3">
                    <div id="progressBar"
                        class="h-3 rounded bg-purple-500 transition-all duration-300"
                        style="width: 0%">
                    </div>
                </div>
                <p id="progressText" class="text-sm mt-1 text-gray-400"></p>
            </div>

            <!-- TASK LIST -->
            <ul id="taskList" class="space-y-2"></ul>
        </section>

        <!-- NOTES -->
        <aside class="p-5 rounded-2xl backdrop-blur-lg border border-purple-500/20 shadow-lg shadow-purple-500/10">
            <h2 class="text-lg font-semibold mb-4">Poznámky</h2>
            <textarea id="notes"
                class="w-full h-40 p-2 bg-gray-700 rounded outline-none"
                placeholder="Napiš si poznámky...">
            </textarea>
        </aside>

        <div class="mt-4 p-3 bg-gray-700 rounded">
            <p id="quoteText" class="text-sm italic"></p>
        </div>

        <!-- PLANNER -->
        <section class="md:col-span-3 p-5 rounded-2xl shadow transition bg-white/10 backdrop-blur-lg border border-white/10 p-5 rounded-2xl shadow">
            <div class="flex justify-between items-center mb-4">
                <button id="prevMonth" class="px-3 py-1 bg-gray-700 rounded shadow-lg shadow-gray-700/60">←</button>
                <h2 id="monthLabel" class="text-lg font-semibold"></h2>
                <button id="nextMonth" class="px-3 py-1 bg-gray-700 rounded shadow-lg shadow-gray-700/60">→</button>
            </div>

            <div id="calendar" class="grid grid-cols-7 gap-1 sm:gap-2 text-xs sm:text-base text-center"></div>
        </section>

    </main>

    <div id="toastContainer" class="fixed top-5 right-5 space-y-2 z-50"></div>

    <script src="app.js"></script>

    <aside>
        <!-- třeba poznámky nebo motivace -->
    </aside>

    <footer>
        <p>&copy; 2025 Webová stránka</p>
    </footer>
</body>
</html>
